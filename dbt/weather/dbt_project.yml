name: "weather"
version: "1.0.0"
config-version: 2

profile: "weather"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  weather:
    staging:
      # Staging stays lightweight: views over the raw source.
      +materialized: view
    marts:
      # Marts are persisted as tables so dashboards read them fast.
      +materialized: table

seeds:
  weather:
    cities:
      +column_types:
        latitude: FLOAT64
        longitude: FLOAT64
        population: INT64
